<!DOCTYPE html>
<!-- Mobility Choices — riverma.github.io
     NOTE: This app uses ES modules. Serve it (e.g. `python3 -m http.server`) — opening
     index.html via file:// will fail because browsers block module fetches from local files. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ff6b35">
    <title>Mobility Choices</title>

    <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="vendor/leaflet/leaflet.js" defer></script>
</head>
<body>

<!-- Main screen -->
<section class="mc-screen is-active" data-screen="main">
    <header class="mc-app-header">
        <h1 class="mc-h1">Mobility Choices</h1>
        <nav class="mc-header-actions">
            <button type="button" class="mc-icon-btn" data-go="about"    data-icon="info"  aria-label="About & methodology" title="About"></button>
            <button type="button" class="mc-icon-btn" data-go="credits"  data-icon="heart" aria-label="Credits" title="Credits"></button>
            <button type="button" class="mc-icon-btn" data-go="settings" data-icon="gear"  aria-label="Settings" title="Settings"></button>
        </nav>
    </header>

    <div class="mc-search-block" id="searchBlock"></div>

    <div class="mc-actions">
        <button type="button" class="mc-btn-primary" id="compareBtn" disabled>
            <span>Compare routes</span>
            <span data-icon="arrowRight" aria-hidden="true"></span>
        </button>
    </div>

    <div class="mc-banner" id="banner" hidden></div>

    <div class="mc-map-wrap">
        <div id="map" class="mc-map" aria-label="Map showing routes"></div>
    </div>

    <div class="mc-results" id="results"></div>
</section>

<!-- Settings screen -->
<section class="mc-screen" data-screen="settings" id="settingsScreen"></section>

<!-- About screen -->
<section class="mc-screen" data-screen="about" id="aboutScreen"></section>

<!-- Credits screen -->
<section class="mc-screen" data-screen="credits" id="creditsScreen"></section>

<script type="module" src="js/main.js"></script>
<script>
/* Install helper: when opened via #install (from apps.riverma.com), prompt or guide install for THIS app. */
(function () {
  if (location.hash !== '#install') return;
  if ((window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone) return;
  var deferred = null, bar = null;
  function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }
  function render(){
    if (bar) bar.remove();
    bar = document.createElement('div');
    bar.setAttribute('role','dialog'); bar.setAttribute('aria-label','Install this app');
    bar.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:2147483647;background:#16233f;color:#fff;padding:12px 14px;border-radius:12px;font:600 14px/1.45 -apple-system,BlinkMacSystemFont,system-ui,sans-serif;display:flex;gap:10px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,.35)';
    var msg=document.createElement('span'); msg.style.flex='1';
    if (deferred){
      msg.textContent='Add this app to your device.';
      var ib=document.createElement('button'); ib.textContent='Install';
      ib.style.cssText='background:#fff;color:#16233f;border:0;border-radius:999px;padding:8px 16px;font-weight:800;cursor:pointer;white-space:nowrap';
      ib.onclick=function(){ deferred.prompt(); deferred.userChoice.then(function(){ if(bar) bar.remove(); }); };
      bar.appendChild(msg); bar.appendChild(ib);
    } else if (isIOS()){
      msg.innerHTML='To install: tap the <b>Share</b> button, then <b>Add to Home Screen</b>.';
      bar.appendChild(msg);
    } else {
      msg.innerHTML='To install: open your browser menu, then <b>Install</b> or <b>Add to Home screen</b>.';
      bar.appendChild(msg);
    }
    var x=document.createElement('button'); x.textContent='\u2715'; x.setAttribute('aria-label','Dismiss');
    x.style.cssText='background:transparent;color:#fff;border:0;font-size:16px;line-height:1;cursor:pointer;padding:4px';
    x.onclick=function(){ if(bar) bar.remove(); };
    bar.appendChild(x); document.body.appendChild(bar);
  }
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; render(); });
  window.addEventListener('load', function(){ setTimeout(function(){ if(!bar) render(); }, 500); });
})();
</script>
</body>
</html>
